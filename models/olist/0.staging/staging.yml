version: 2

sources:
  - name: olist_raw
    database: portfolio-project-493407
    schema: olistic_raw ## typo in GCP
    tables:
      - name: customers
      - name: orders
      - name: order_payments
      - name: order_items
      - name: products

models:
- name: stg_orders
  description: "Staging model for orders."
  columns:
    - name: order_id
      description: "Primary key of the orders table."
      tests:
        - unique
        - not_null

    - name: customer_id
      description: "Foreign key to customers."
      tests:
        - not_null
        - relationships:
            arguments:
              to: ref('stg_customers')
              field: customer_id

    - name: order_status
      description: "Status of the order."
      tests:
        - not_null
        - accepted_values:
            arguments:
              values: ['created', 'approved', 'invoiced', 'processing', 'shipped', 'delivered', 'unavailable', 'canceled']

- name: stg_customers
  description: "Staging model for customers."
  columns:
    - name: customer_id
      description: "Primary key of the customers table."
      tests:
        - unique
        - not_null

    - name: customer_unique_id
      description: "Stable customer identifier across orders."
      tests:
        - not_null


- name: stg_order_payments
  description: "Staging model for order payments."
  columns:
    - name: order_id
      description: "Foreign key to orders."
      tests:
        - not_null
        - relationships:
            arguments:
              to: ref('stg_orders')
              field: order_id



- name: stg_order_items
  description: "Staging model for order items."
  columns:
    - name: order_id
      description: "Foreign key to orders."
      tests:
        - not_null
        - relationships:
            arguments:
              to: ref('stg_orders')
              field: order_id

    - name: product_id
      description: "Foreign key to products."
      tests:
        - not_null
        - relationships:
            arguments:
              to: ref('stg_products')
              field: product_id


- name: stg_products
  description: "Staging model for products."
  columns:
    - name: product_id
      description: "Primary key of the products table."
      tests:
          - unique
          - not_null