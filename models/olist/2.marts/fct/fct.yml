
version: 2

models:
  - name: fct_orders
    description: "Fact table with one row per order, containing business-ready revenue and delivery metrics."

    columns:
      - name: order_id
        description: "Primary key for the fact table."
        tests:
          - unique
          - not_null

      - name: customer_id
        description: "Foreign key to dim_customers."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: order_date
        description: "Date when the order was placed."
        tests:
          - not_null

      - name: order_gmv
        description: "Total order value including items and freight."

      - name: avg_item_value
        description: "Average value per item in the order."

      - name: days_to_deliver
        description: "Days between purchase and delivery."

      - name: delivery_delay_days
        description: "Difference between actual and estimated delivery."

      - name: is_delivered
        description: "Flag indicating whether the order was delivered."

  - name: fct_order_items
    description: "Fact table with one row per order item line, combining item-level revenue with order, customer, and delivery context."

    tests:
      - dbt_utils.unique_combination_of_columns:
                arguments:
                  combination_of_columns:            
                  - order_id
                  - order_item_id

    columns:
      - name: order_id
        description: "Order identifier."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id

      - name: order_item_id
        description: "Sequential identifier of the item within the order."
        tests:
          - not_null

      - name: product_id
        description: "Foreign key to dim_products."
        tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('dim_products')
                field: product_id

      - name: seller_id
        description: "Seller identifier associated with the order item."
        tests:
          - not_null

      - name: customer_id
        description: "Foreign key to dim_customers."
        tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('dim_customers')
                field: customer_id

      - name: order_date
        description: "Date when the order was placed."
        tests:
          - not_null

      - name: shipping_limit_ts
        description: "Shipping deadline timestamp for the order item."

      - name: price
        description: "Item price."
        tests:
          - not_null

      - name: freight_value
        description: "Freight value allocated to the order item."
        tests:
          - not_null

      - name: item_gmv
        description: "Total item value including freight."

      - name: days_to_deliver
        description: "Days between purchase and delivery."

      - name: delivery_delay_days
        description: "Difference between actual and estimated delivery date."

      - name: is_delivered
        description: "Flag indicating whether the order was delivered."


